# Server Configuration
server:
  host: "0.0.0.0"
  port: 5000
  debug: false

# Solr Configuration
solr:
  url: "http://localhost:8983/solr"
  collection: "ai_tools_opinions"
  timeout: 30
  batch_size: 100
  vector_field: "vector"

# Embeddings Configuration
embeddings:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  # Alternative: "sentence-transformers/all-mpnet-base-v2" (better quality, slower)
  max_seq_length: 256  # all-MiniLM-L6-v2 was trained on 256 tokens; setting higher degrades quality
  batch_size: 32
  device: "cpu"  # or "cuda" if GPU available

# Search Configuration
search:
  rrf_k: 60
  default_page_size: 10
  max_page_size: 100
  solr_rows: 100  # Fetch top N from Solr for RRF
  vector_n_results: 100  # Fetch top N from Solr KNN for RRF
  min_similarity_threshold: 0.6  # Trend default: filter posts with < 0.6 vector score (Solr range 0.5–1.0)

  # Sentiment boosting multipliers
  sentiment_boost:
    enabled: False
    positive: 1.2
    negative: 0.8
    mixed: 1.0
    not_applicable: 1.0

  # Aspect-aware re-ranking: boost docs whose indexed aspects match query-detected aspects
  aspect_boost:
    enabled: true
    boost_multiplier: 1.3

  # Time-decay tiebreaker: penalise older posts when scores are near-identical
  time_decay:
    enabled: true
    lambda: 0.001          # decay rate per day; 0.001 ≈ ~50% penalty after ~693 days
    score_similarity_threshold: 0.005  # only apply when adjacent scores differ by less than this

  # MMR diversity reranking — reduces near-duplicate results
  mmr:
    enabled: true
    lambda: 0.8          # 0.0 = max diversity, 1.0 = pure relevance (disabled)
    candidate_pool: 50   # run MMR on top-N filtered results; rest appended unchanged

# Data Configuration
data:
  source_path: "./data/eval_final_labelled.jsonl"
  date_format: "%Y-%m-%dT%H:%M:%SZ"

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/app.log"
